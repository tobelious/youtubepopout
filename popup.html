<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>YouTube Popout</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div class="form">
    <label>YouTube URL
      <input type="text" id="yt-url" placeholder="Paste a link..." autocomplete="off" spellcheck="false"/>
    </label>
    
    <div class="checkbox-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-autoplay" checked/>
        Autoplay
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-mute"/>
        Muted
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-loop"/>
        Loop
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-controls"/>
        Hide controls
      </label>
    </div>

    <div class="input-row">
      <label>Start (sec)
        <input type="number" id="start-time" placeholder="0" min="0"/>
      </label>
      <label>Width
        <input type="number" id="win-w" placeholder="1280" min="400"/>
      </label>
      <label>Height
        <input type="number" id="win-h" placeholder="720" min="300"/>
      </label>
    </div>

    <button class="btn" id="pop-btn" disabled>Pop Out</button>
  </div>

  <a href="https://tobelious.vercel.app" target="_blank" rel="noopener noreferrer" class="author-link">tobelious.vercel.app</a>

  <script src="popup.js"></script>
</body>
</html>
